<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>BioDockLab</title>

  <script src="https://cdn.jsdelivr.net/npm/ngl@latest/dist/ngl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      background: #020617;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid #1e293b;
      background: linear-gradient(135deg,#0f172a,#020617);
    }

    h1 {
      margin: 0;
      font-size: 42px;
    }

    .subtitle {
      color: #94a3b8;
      margin-top: 8px;
    }

    main {
      padding: 24px;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 24px;
    }

    .card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 18px;
      padding: 20px;
    }

    #viewport {
      width: 100%;
      height: 700px;
      border-radius: 16px;
      overflow: hidden;
      background: black;
    }

    select {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      background: #1e293b;
      color: white;
      font-size: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 18px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      color: #93c5fd;
    }

    .score {
      color: #22c55e;
      font-weight: bold;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      background: #1d4ed8;
      border-radius: 999px;
      font-size: 13px;
      margin-top: 8px;
    }

    canvas {
      margin-top: 20px;
      background: #111827;
      border-radius: 12px;
      padding: 10px;
    }

    footer {
      padding: 24px;
      color: #64748b;
    }
  </style>
</head>

<body>

<header>
  <h1>BioDockLab</h1>
  <div class="subtitle">
    Interactive Protein-Ligand Docking Visualization Platform
  </div>
</header>

<main>

  <section class="card">

    <h2>Protein Selection</h2>

    <select id="protein-select"></select>

    <div id="protein-info" style="margin-top:20px;"></div>

    <h2 style="margin-top:32px;">Docking Results</h2>

    <div id="docking-results"></div>

    <canvas id="scoreChart"></canvas>

  </section>

  <section class="card">
    <h2>3D Molecular Viewer</h2>
    <div id="viewport"></div>
  </section>

</main>

<footer>
  Educational visualization platform only. Not for pharmaceutical validation.
</footer>

<script>
const API_BASE = "http://127.0.0.1:8000";

let stage = new NGL.Stage("viewport");
let chart;
let proteins = [];

window.addEventListener("resize", () => {
  stage.handleResize();
});

async function init() {
  const res = await fetch(`${API_BASE}/proteins`);
  proteins = await res.json();

  const select = document.getElementById("protein-select");

  select.innerHTML = proteins.map(protein => `
    <option value="${protein.id}">${protein.name}</option>
  `).join("");

  select.addEventListener("change", (e) => {
    loadProtein(e.target.value);
  });

  loadProtein(proteins[0].id);
}

async function loadProtein(pdbId) {
  const protein = proteins.find(item => item.id === pdbId);

  document.getElementById("protein-info").innerHTML = `
    <h3>${protein.name}</h3>
    <div class="badge">PDB ID: ${protein.id}</div>
    <p><strong>Category:</strong> ${protein.category}</p>
    <p>${protein.description}</p>
  `;

  load3DViewer(pdbId);
  loadDockingResults(pdbId);
}

function load3DViewer(pdbId) {
  stage.removeAllComponents();

  stage.loadFile(
    `https://files.rcsb.org/download/${pdbId}.pdb`
  ).then(component => {
    component.addRepresentation("cartoon", {
      color: "skyblue"
    });

    component.addRepresentation("ball+stick", {
      sele: "hetero",
      color: "orange"
    });

    component.autoView();
  });
}

async function loadDockingResults(pdbId) {
  const res = await fetch(`${API_BASE}/docking/${pdbId}`);
  const data = await res.json();

  const rows = data.ligands.map(ligand => `
    <tr>
      <td>#${ligand.rank}</td>
      <td>${ligand.name}</td>
      <td class="score">${ligand.binding_score}</td>
    </tr>
  `).join("");

  document.getElementById("docking-results").innerHTML = `
    <p><strong>Note:</strong> ${data.note}</p>
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Ligand</th>
          <th>Binding Score</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
      </tbody>
    </table>
  `;

  updateChart(data.ligands);
}

function updateChart(ligands) {
  const ctx = document.getElementById("scoreChart");

  if(chart) {
    chart.destroy();
  }

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ligands.map(l => l.name),
      datasets: [{
        label: "Binding Score",
        data: ligands.map(l => l.binding_score)
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: "white" }
        }
      },
      scales: {
        x: {
          ticks: { color: "white" }
        },
        y: {
          ticks: { color: "white" }
        }
      }
    }
  });
}

init();
</script>

</body>
</html>
