<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>BioDockLab</title>

  <script src="https://cdn.jsdelivr.net/npm/ngl@latest/dist/ngl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    body {
      margin: 0;
      background: #020617;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid #1e293b;
      background: linear-gradient(135deg,#0f172a,#020617);
    }

    h1 {
      margin: 0;
      font-size: 42px;
    }

    .subtitle {
      color: #94a3b8;
      margin-top: 8px;
    }

    main {
      padding: 24px;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 24px;
    }

    .card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 18px;
      padding: 20px;
    }

    #viewport {
      width: 100%;
      height: 700px;
      border-radius: 16px;
      overflow: hidden;
      background: black;
    }

    select {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      background: #1e293b;
      color: white;
      font-size: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 18px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      color: #93c5fd;
    }

    .score {
      color: #22c55e;
      font-weight: bold;
    }

    canvas {
      margin-top: 20px;
      background: #111827;
      border-radius: 12px;
      padding: 10px;
    }

    footer {
      padding: 24px;
      color: #64748b;
    }

  </style>
</head>

<body>

<header>
  <h1>BioDockLab</h1>
  <div class="subtitle">
    Interactive Protein-Ligand Docking Visualization Platform
  </div>
</header>

<main>

  <section class="card">

    <h2>Protein Selection</h2>

    <select id="protein-select">
      <option value="6LU7">SARS-CoV-2 Main Protease</option>
      <option value="1CRN">Crambin</option>
      <option value="1MBN">Myoglobin</option>
    </select>

    <div id="protein-info" style="margin-top:20px;"></div>

    <h2 style="margin-top:32px;">Docking Results</h2>

    <div id="docking-results"></div>

    <canvas id="scoreChart"></canvas>

  </section>

  <section class="card">
    <h2>3D Molecular Viewer</h2>
    <div id="viewport"></div>
  </section>

</main>

<footer>
  Educational visualization platform only. Not for pharmaceutical validation.
</footer>

<script>

let stage = new NGL.Stage("viewport");

window.addEventListener("resize", () => {
  stage.handleResize();
});

const dockingData = {
  "6LU7": {
    protein: "SARS-CoV-2 Main Protease",
    ligands: [
      {name:"Ligand-A", score:-8.7},
      {name:"Ligand-B", score:-7.9},
      {name:"Ligand-C", score:-6.3}
    ]
  },

  "1CRN": {
    protein: "Crambin",
    ligands: [
      {name:"Ligand-X", score:-5.2},
      {name:"Ligand-Y", score:-4.8},
      {name:"Ligand-Z", score:-4.1}
    ]
  },

  "1MBN": {
    protein: "Myoglobin",
    ligands: [
      {name:"Ligand-M", score:-7.1},
      {name:"Ligand-N", score:-6.8},
      {name:"Ligand-O", score:-6.0}
    ]
  }
};

let chart;

function loadProtein(pdbId) {

  stage.removeAllComponents();

  stage.loadFile(
    `https://files.rcsb.org/download/${pdbId}.pdb`
  ).then(component => {

    component.addRepresentation("cartoon", {
      color: "skyblue"
    });

    component.addRepresentation("ball+stick", {
      sele: "hetero",
      color: "orange"
    });

    component.autoView();

  });

  updateInfo(pdbId);
}

function updateInfo(pdbId) {

  const data = dockingData[pdbId];

  document.getElementById("protein-info").innerHTML = `
    <h3>${data.protein}</h3>
    <p><strong>PDB ID:</strong> ${pdbId}</p>
    <p>Interactive molecular visualization loaded from Protein Data Bank.</p>
  `;

  const rows = data.ligands.map((ligand, index) => `
    <tr>
      <td>#${index + 1}</td>
      <td>${ligand.name}</td>
      <td class="score">${ligand.score}</td>
    </tr>
  `).join("");

  document.getElementById("docking-results").innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Ligand</th>
          <th>Binding Score</th>
        </tr>
      </thead>

      <tbody>
        ${rows}
      </tbody>
    </table>
  `;

  updateChart(data.ligands);
}

function updateChart(ligands) {

  const ctx = document.getElementById("scoreChart");

  if(chart) {
    chart.destroy();
  }

  chart = new Chart(ctx, {

    type: 'bar',

    data: {

      labels: ligands.map(l => l.name),

      datasets: [{
        label: 'Binding Score',
        data: ligands.map(l => l.score)
      }]
    },

    options: {
      responsive: true,

      plugins: {
        legend: {
          labels: {
            color: 'white'
          }
        }
      },

      scales: {

        x: {
          ticks: {
            color: 'white'
          }
        },

        y: {
          ticks: {
            color: 'white'
          }
        }
      }
    }
  });
}

document.getElementById("protein-select")
.addEventListener("change", (e) => {

  loadProtein(e.target.value);

});

loadProtein("6LU7");

</script>

</body>
</html>
