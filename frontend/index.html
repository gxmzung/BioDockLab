<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BioDockLab</title>

  <script src="https://cdn.jsdelivr.net/npm/ngl@latest/dist/ngl.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid #334155;
    }

    h1 {
      margin: 0;
      font-size: 40px;
    }

    .subtitle {
      color: #94a3b8;
      margin-top: 8px;
    }

    main {
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 20px;
    }

    #viewport {
      width: 100%;
      height: 500px;
      border-radius: 12px;
      overflow: hidden;
      background: black;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      color: #93c5fd;
    }

    .score {
      color: #22c55e;
      font-weight: bold;
    }

    footer {
      padding: 24px;
      color: #64748b;
    }
  </style>
</head>

<body>

<header>
  <h1>BioDockLab</h1>
  <div class="subtitle">
    Web-based Protein-Ligand Docking Visualization Platform
  </div>
</header>

<main>

  <section class="card">
    <h2>Protein Information</h2>
    <div id="protein-info"></div>

    <h2 style="margin-top:32px;">Docking Results</h2>
    <div id="docking-results"></div>
  </section>

  <section class="card">
    <h2>3D Molecular Viewer</h2>
    <div id="viewport"></div>
  </section>

</main>

<footer>
  BioDockLab is an educational platform. Docking scores are not clinical evidence.
</footer>

<script>

const API_BASE = "http://127.0.0.1:8000";

async function loadProtein() {
  const res = await fetch(`${API_BASE}/proteins`);
  const proteins = await res.json();

  const protein = proteins[0];

  document.getElementById("protein-info").innerHTML = `
    <h3>${protein.name}</h3>
    <p><strong>PDB ID:</strong> ${protein.pdb_id}</p>
    <p>${protein.description}</p>
  `;

  load3DProtein(protein.pdb_id);
}

async function loadDockingResults() {
  const res = await fetch(`${API_BASE}/docking/1`);
  const data = await res.json();

  const rows = data.ligands.map(ligand => `
    <tr>
      <td>#${ligand.rank}</td>
      <td>${ligand.name}</td>
      <td class="score">${ligand.binding_score}</td>
    </tr>
  `).join("");

  document.getElementById("docking-results").innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Ligand</th>
          <th>Binding Score</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
      </tbody>
    </table>
  `;
}

function load3DProtein(pdbId) {

  const stage = new NGL.Stage("viewport");

  window.addEventListener("resize", () => {
    stage.handleResize();
  });

  stage.loadFile(
    `https://files.rcsb.org/download/${pdbId}.pdb`
  ).then(component => {

    component.addRepresentation("cartoon", {
      color: "skyblue"
    });

    component.addRepresentation("ball+stick", {
      sele: "hetero"
    });

    component.autoView();
  });
}

loadProtein();
loadDockingResults();

</script>

</body>
</html>
