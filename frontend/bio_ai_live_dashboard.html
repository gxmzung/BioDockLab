<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>BioDockLab Live Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f7ff;
      color: #101828;
    }

    .wrap {
      width: 1100px;
      margin: 48px auto;
    }

    .hero {
      background: white;
      border-radius: 28px;
      padding: 44px;
      box-shadow: 0 20px 60px rgba(37, 99, 235, 0.14);
    }

    .badge {
      display: inline-block;
      background: #eaf2ff;
      color: #2563eb;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 44px;
      margin: 0 0 16px;
      line-height: 1.15;
    }

    .desc {
      color: #475467;
      font-size: 18px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 34px;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 24px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 14px 38px rgba(15, 23, 42, 0.08);
    }

    .id {
      color: #2563eb;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .domain {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .meta {
      color: #475467;
      line-height: 1.6;
      font-size: 15px;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 16px 0 10px;
    }

    .fill {
      height: 100%;
      background: #2563eb;
      border-radius: 999px;
    }

    .risk {
      display: inline-block;
      padding: 8px 10px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #334155;
      font-weight: 800;
      font-size: 13px;
      margin-top: 10px;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: #667085;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="badge">BioDockLab v2.1 · Live Data Dashboard</div>
      <h1>실험 데이터 기반<br>바이오 AI 대시보드</h1>
      <p class="desc">
        이 화면은 정적 HTML이 아니라 Node 서버의 API에서
        <b>bio_experiments.json</b> 데이터를 읽어와 카드 UI로 렌더링합니다.
      </p>
    </section>

    <section id="cards" class="grid"></section>

    <div class="footer">
      BioDockLab · Frontend + Node API + Sample Bio Data
    </div>
  </main>

  <script>
    const cards = document.getElementById("cards");

    function renderRisk(risk) {
      if (risk === "Low") return "Risk: Low";
      if (risk === "Medium") return "Risk: Medium";
      return "Risk: High";
    }

    fetch("/api/experiments")
      .then((res) => res.json())
      .then((experiments) => {
        cards.innerHTML = experiments.map((exp) => `
          <article class="card">
            <div class="id">${exp.id}</div>
            <div class="domain">${exp.domain}</div>
            <div class="meta">
              <b>Sample</b><br>${exp.sample}<br><br>
              <b>Condition</b><br>${exp.condition}<br><br>
              <b>Note</b><br>${exp.note}
            </div>
            <div class="bar">
              <div class="fill" style="width:${exp.success_rate}%"></div>
            </div>
            <b>Success Rate: ${exp.success_rate}%</b><br>
            <span class="risk">${renderRisk(exp.risk_level)}</span>
          </article>
        `).join("");
      })
      .catch((err) => {
        cards.innerHTML = "<p>Failed to load experiment data.</p>";
        console.error(err);
      });
  </script>
</body>
</html>
